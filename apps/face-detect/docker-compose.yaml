version: "3.8"

services:
    face_detection:
        build:
            context: .
            dockerfile: Dockerfile
        restart: "always"
        volumes:
            - ./src:/app
            - ./models:/app/models
        environment:
            - MODEL_PATH=/app/models/yolov11n-face.pt
        ports:
            - "8000:8000"
        command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
