{{- if .Values.networkPolicy.enabled }}
# Default deny-all in model-serving namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-deny-default
  namespace: model-serving
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Allow ingress from gateway namespace, egress to observability + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow
  namespace: model-serving
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.ingressFromNamespace }}
      ports:
        - port: 8000
          protocol: TCP
  egress:
    {{- range .Values.networkPolicy.egressNamespaces }}
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ . }}
    {{- end }}
    # DNS egress (cluster DNS)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
