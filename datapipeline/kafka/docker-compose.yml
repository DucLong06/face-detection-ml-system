version: "3.8"
services:
    # Test connectivity service với correct paths
    kafka-test:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka-test
        network_mode: host
        command: >
            bash -c "
              echo '🧪 Testing Kafka connectivity...'
              echo 'security.protocol=SASL_PLAINTEXT' > /tmp/client.properties
              echo 'sasl.mechanism=PLAIN' >> /tmp/client.properties
              echo 'sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"user1\" password=\"${CLIENT_PASSWORD}\";' >> /tmp/client.properties
              
              echo '📋 Client config:'
              cat /tmp/client.properties
              
              for i in {1..30}; do
                echo \"🔄 Attempt \$$i: Testing Kafka connection...\"
                if /usr/bin/kafka-topics --bootstrap-server localhost:9092 --command-config /tmp/client.properties --list; then
                  echo \"✅ Kafka connection successful!\"
                  break
                else
                  echo \"❌ Kafka connection failed, retrying in 10s...\"
                  echo \"🔍 Testing raw connection to localhost:9092\"
                  timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/9092' && echo \"✅ Port 9092 is reachable\" || echo \"❌ Port 9092 is not reachable\"
                  sleep 10
                fi
              done
              
              echo \"📊 Final test with verbose output:\"
              /usr/bin/kafka-topics --bootstrap-server localhost:9092 --command-config /tmp/client.properties --list --timeout 10000 || echo \"Final test failed\"
              
              echo \"🔄 Keeping container running for debugging...\"
              tail -f /dev/null
            "

    schema-registry:
        image: confluentinc/cp-schema-registry:7.5.0
        container_name: schema-registry
        network_mode: host
        environment:
            SCHEMA_REGISTRY_HOST_NAME: localhost
            SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "localhost:9092"
            SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_PLAINTEXT
            SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: PLAIN
            SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="user1" password="${CLIENT_PASSWORD}";'
            SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
            SCHEMA_REGISTRY_DEBUG: "true"
        depends_on:
            - kafka-test
        restart: unless-stopped

    kafka-connect:
        image: confluentinc/cp-kafka-connect:7.5.0
        container_name: kafka-connect
        network_mode: host
        environment:
            CONNECT_BOOTSTRAP_SERVERS: "localhost:9092"
            CONNECT_SECURITY_PROTOCOL: SASL_PLAINTEXT
            CONNECT_SASL_MECHANISM: PLAIN
            CONNECT_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="user1" password="${CLIENT_PASSWORD}";'

            CONNECT_PRODUCER_SECURITY_PROTOCOL: SASL_PLAINTEXT
            CONNECT_PRODUCER_SASL_MECHANISM: PLAIN
            CONNECT_PRODUCER_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="user1" password="${CLIENT_PASSWORD}";'

            CONNECT_CONSUMER_SECURITY_PROTOCOL: SASL_PLAINTEXT
            CONNECT_CONSUMER_SASL_MECHANISM: PLAIN
            CONNECT_CONSUMER_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="user1" password="${CLIENT_PASSWORD}";'

            CONNECT_REST_ADVERTISED_HOST_NAME: localhost
            CONNECT_REST_PORT: 8083
            CONNECT_GROUP_ID: compose-connect-group
            CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
            CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
            CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
            CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
            CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
            CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
            CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
            CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
            CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
        depends_on:
            - schema-registry
        restart: unless-stopped

    control-center:
        image: confluentinc/cp-enterprise-control-center:7.5.0
        container_name: control-center
        network_mode: host
        environment:
            CONTROL_CENTER_BOOTSTRAP_SERVERS: "localhost:9092"
            CONTROL_CENTER_SECURITY_PROTOCOL: SASL_PLAINTEXT
            CONTROL_CENTER_SASL_MECHANISM: PLAIN
            CONTROL_CENTER_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="user1" password="${CLIENT_PASSWORD}";'

            CONTROL_CENTER_CONNECT_CONNECT-DEFAULT_CLUSTER: "localhost:8083"
            CONTROL_CENTER_SCHEMA_REGISTRY_URL: "http://localhost:8081"
            CONTROL_CENTER_REPLICATION_FACTOR: 1
            CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
            CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
            CONFLUENT_METRICS_TOPIC_REPLICATION: 1
        depends_on:
            - kafka-connect
        restart: unless-stopped

    timescaledb:
        image: timescale/timescaledb:latest-pg13
        container_name: timescaledb
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: k6
            POSTGRES_USER: k6
            POSTGRES_PASSWORD: k6
        volumes:
            - timescale_data:/var/lib/postgresql/data

volumes:
    timescale_data:
